# Agent commercial local ETS Maria — démo RAG sécurisée locale.
# Sécurité par la topologie : ollama/hermes/open-webui sur net_internal
# (internal: true, aucune route internet directe). egress-proxy est le SEUL
# pont vers internet, restreint par allowlist. Un seul port publié : 3000.

services:
  ollama:
    image: ollama/ollama:0.6.8
    container_name: maria-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_CONTEXT_LENGTH=65536
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q4_0
      # ollama pull passe par le seul canal egress autorisé (registre Ollama).
      - HTTP_PROXY=http://egress-proxy:8888
      - HTTPS_PROXY=http://egress-proxy:8888
      # 0.0.0.0 = adresse du serveur ollama local (OLLAMA_HOST par défaut).
      # Sans lui, l'appel du CLI `ollama pull` vers son propre serveur part dans
      # l'egress-proxy (refusé, "0.0.0.0" hors allowlist) => pull impossible.
      - NO_PROXY=localhost,127.0.0.1,0.0.0.0,hermes,open-webui,ollama
    volumes:
      - ollama_models:/root/.ollama
    networks: [net_internal]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  hermes:
    image: hermes-agent:local
    container_name: maria-hermes
    restart: unless-stopped
    depends_on: [ollama]
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
      # Bind 0.0.0.0 DANS le conteneur (joignable par open-webui sur net_internal).
      # Aucun port publié + réseau sans egress => pas une exposition.
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${MARIA_API_KEY:?MARIA_API_KEY manquante — copier .env.example vers .env}
    command: ["gateway", "run"]
    networks: [net_internal]

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.5
    container_name: maria-open-webui
    restart: unless-stopped
    depends_on: [hermes]
    ports:
      - "127.0.0.1:3000:8080"             # SEUL port publié, bind loopback (démo locale)
    environment:
      - WEBUI_AUTH=true
      - ENABLE_COMMUNITY_FEATURES=false
      - WEBUI_BANNERS=false
      - OPENAI_API_BASE_URL=http://hermes:8642/v1
      - OPENAI_API_KEY=${MARIA_API_KEY:?MARIA_API_KEY manquante}
      # RAG natif : embeddings locaux.
      - RAG_EMBEDDING_ENGINE=
      - RAG_EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      # Web contrôlé : recherche activée, sortie forcée par le proxy allowlist.
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=duckduckgo
      - HTTP_PROXY=http://egress-proxy:8888
      - HTTPS_PROXY=http://egress-proxy:8888
      - NO_PROXY=localhost,127.0.0.1,hermes,ollama
    volumes:
      - open-webui:/app/backend/data
      # Source canonique des données Maria, lecture seule dans le conteneur.
      # L'ingestion (upload manuel dans la collection Knowledge) écrit dans
      # le volume open-webui ci-dessus, PAS ici : /data reste ro.
      - ./data:/data:ro
    # net_internal : joint hermes/ollama (sans internet). net_publish : permet
    # SEULEMENT la publication du port 3000 vers l'hôte (un réseau internal ne
    # peut pas publier de port). Masquerade OFF sur net_publish => aucune route
    # internet directe fonctionnelle ; egress-proxy reste le seul chemin sortant.
    networks: [net_internal, net_publish]

  egress-proxy:
    build: ./proxy
    container_name: maria-egress
    restart: unless-stopped
    volumes:
      - ./proxy/tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./proxy/filter:/etc/tinyproxy/filter:ro
    networks: [net_internal, net_egress]   # SEUL service à toucher net_egress

networks:
  net_internal:
    internal: true
  net_egress:
    driver: bridge
  # Réseau à seule fin de publier open-webui:3000 vers l'hôte. Masquerade
  # désactivé : ingress (host -> conteneur) OK, mais pas de SNAT donc pas
  # d'egress internet direct qui fonctionne. Ne PAS y attacher ollama/hermes.
  net_publish:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"

volumes:
  ollama_models:
  open-webui:
